# slice13_decoy — countermeasures: a decoy seduces a CFAR-scanning seeker; the α-β gate rejects it
# (HANDOFF §10 item 12, slice 13 gate 3 — "this stage FUSES the whole suite"). The missile guidance
# arc (slices 8–12) is COMPLETE; slice 13 opens the countermeasures arc by putting a DECOY in front of
# the slice-11 seeker and lifting the slice-3 CFAR sandbox onto the seeker's LOS-ANGLE axis. The seeker
# forms a NOISY angular-power PROFILE over a fixed grid, CFAR-DETECTS the peaks (target + decoy lobes),
# and either BLENDS them (:none — an intensity-weighted centroid walks the aim OFF the truth) or
# DISCRIMINATES (:gated — a nearest-neighbour gate on the α-β PREDICTED LOS rejects the separated
# decoy). The reused libs do DIFFERENT jobs: detection.jl (cfar_scan) DETECTS the peaks in the noisy
# profile; estimation.jl (the α-β predicted-LOS gate) DISCRIMINATES which peak to keep — and THAT gate
# IS the RGPO track-gate (§9: "a seeker walked off by a decoy IS the RGPO model", realised in ANGLE).
#
# THE LESSON (the fidelity button, :none ↔ :gated — the NEW `discrimination` key):
#   :none (no discrimination, the DEFAULT so the button reveals the fix) — the intensity-weighted
#   centroid of ALL detected peaks tracks a bearing BETWEEN the target and the brighter decoy; the aim
#   walks OFF the truth (aimpoint error ~several degrees) and PN leads toward the blend → a MISS.
#   Cycle to :gated — CFAR-detect the peaks, keep the nearest one to the α-β PREDICTED bearing (the
#   target-locked track always returns the target peak — the decoy sits outside the gate), centroid
#   that → the decoy is REJECTED → the aim stays on the truth → tight intercept (≈ the :scan no-decoy
#   baseline). `discrimination` is DRAW-INVARIANT among its rungs (both paint the SAME profile + draw
#   the SAME 2·N_p·N_bins randn — they differ ONLY in post-detection peak SELECTION) YET
#   TRAJECTORY-CHANGING (a :none↔:gated toggle MOVES the missile) — the slice-11 shape one level up.
#   It is INERT without `seeker=:scan` (no profile → no peaks → nothing to discriminate — the
#   :raim-without-GPS coupling).
#
#   THE HEADLINE IS AIMPOINT (bearing) ERROR, NOT terminal miss (the gate-0 probe pivot). The aim error
#   |λ_est − λ_target| is clean BY CONSTRUCTION (it comes from the profile + α-β, independent of whether
#   PN saturates in the endgame); terminal miss folds in the endgame bearing blow-up + saturation and is
#   chaotic. So `a_max = 3000` is GENEROUS and does NOT bind midcourse — this is a POINTING miss, not a
#   saturation miss (the OPPOSITE of slice-12, where the g-limit WAS the lesson). Miss CORROBORATES
#   cleanly at this operating point. Re-probed on the live load_scenario→observe!→decide!→integrate!→
#   telemetry EMIT-GRID wire (emit_probe.jl): the numbers are pinned into the verifier as comments.
#
#   MISS/CPA is ALWAYS measured vs the true `:target`, NEVER the `:decoy` (the truth-path invariant):
#   the decoy is `kind === :decoy`, so `_nearest_target` (radar / jammer / the Autopilot truth path /
#   the CPA-miss readout) SKIPS it — the seeker may be SEDUCED, but the miss is the HONEST miss against
#   the thing the missile was supposed to hit. The `:scan` seeker's angular profile is the ONLY consumer
#   that sees the decoy.
#
# THE CUED-LOCK PRECONDITION (the load-bearing seam): the α-β track must START on the target when the
# decoy is present. The `:scan` observe! seeds the α-β on TICK 1 from the truth LOS to `_nearest_target`
# (which excludes `:decoy` by kind) — so the track locks the TRUE target first, robust EVEN with the
# decoy present from t=0. `:gated`'s nearest-neighbour then always returns the target peak. A tick-1
# PEAK-pick seed could land on the brighter decoy and INVERT the lesson — hence the truth-cued seed.
#
# THE DECOY GEOMETRY (born ALREADY-RESOLVED — the flare / off-board reading, gate-0 pivot #2): the decoy
# is present from t=0 at an angular offset Δ₀ ≈ 0.10 rad from the target (≈ 6·σ_beam ≫ a beamwidth → it
# RESOLVES into a SECOND CFAR peak, not a merged blob) and flies PARALLEL to the target (same velocity →
# a fixed linear offset). A co-located-then-walk-off decoy has a merged-unresolved phase where a brighter
# lobe STEALS the single-peak centroid before the gate can act (that IS RGPO) — DEFERRED as a forward
# variant; gate 3 ships the born-resolved case (one lesson). Because the offset is fixed and the missile
# closes, the subtended Δ GROWS over the run — the decoy stays inside ±FOV/2 (±0.16) across the midcourse
# aim window (verifier-checked); by the endgame it exits the grid, harmless (CPA is already decided and
# both rungs' bearing blows up as r→0). Named approximations (HANDOFF §1; convention 9 — DEFERRED,
# NAMED): constant velocity, constant intensity, present from t=0 (no bloom / burn-out / timed ejection);
# ONE generic decoy (chaff shown — intensity = RCS ratio; a flare is the same mechanic, an intensity
# relabel); ONE angle scanned (the in-plane LOS λ = atan(Δz,Δx), a 1-D profile — az×el/monopulse is a
# later fidelity); the range-gate RGPO variant against a TRACKING RADAR (a range gate the angle seeker
# lacks — a future radar-tracking slice, NOT bolted onto this angle-only seeker).
#
# THE ENGAGEMENT (reuses the slice-11/12 crossing so the ONLY new variable is the decoy — convention 9):
# the interceptor climbs from z=3000 m at 12° / 700 m/s; the true target (base [6000,0,4200], v[-800,0,
# 200], |v|≈825 > 700 → OUTRUNS the missile → a diverged aim cannot re-converge, the first CPA is the
# honest miss). Planar in x-z (ω ∥ ±y → the scalar in-plane α-β on λ). dt=1e-3 / emit_every=16.
#
# THE DEAD-KNOB SURPRISE (name it — the noise MOVED): under :scan the measurement noise enters via the
# profile's fast-Rayleigh floor (the 2·N_p·N_bins draws), NOT a +σ·randn output draw — so the slice-11
# `sigma_seek` slider goes INERT here (it scaled the removed draw). The live noise knob is now the
# profile SNR / `pfa` (lobe amplitude over the floor). `sigma_seek` is kept in the block for format but
# is NOT exposed as a slider (a learner arriving from slice 11 must not discover a silently-dead knob).
#
# UNITS (the §1 trifecta): positions/velocities SI (m, m/s), all seeker angles in RADIANS, launch
# ELEVATION in DEGREES → radians at the loader. The seeker draws its noisy profile every tick (2·N_p·
# N_bins = 1280 randn/tick — the class-4b topology flip from :filtered's 1); this scenario carries a SEED.
name: slice13_decoy
seed: 6
dt_physics: 1.0e-3
emit_every: 16
fidelity:
  # FOUR keys, but ONE lesson: discrimination is the toggle (the button cycles :none↔:gated), and
  # seeker=:scan / guidance=:pn / autopilot=:ideal are HELD so the miss isolates the DISCRIMINATION
  # lesson (convention 9 — one lesson per button; the client checks `discrimination` BEFORE seeker/
  # guidance/autopilot). discrimination is draw-invariant among its rungs (introduce-safe once :scan is
  # on) AND trajectory-changing; :scan is class-4b (topology-flipping → set_fidelity REJECTS introducing
  # OR removing it, the :cfar precedent).
  discrimination: none
  seeker: scan
  guidance: pn
  autopilot: ideal

entities:
  # The guided interceptor: launched from the origin at z=3000 m, CLIMBING at 12° at 700 m/s in the x-z
  # plane. mass 140 kg, DRAG OFF (one lesson per scenario). The `guidance:` block makes it GUIDED and the
  # `seeker:` block with `seeker=:scan` fidelity runs the angular-profile-CFAR path → [BallisticMissile,
  # Seeker, Autopilot]. a_max = 3000 m/s² (~306 g) is GENEROUS (does NOT bind midcourse — the headline is
  # a POINTING miss, not saturation; ≠ slice-12); r_stop = 30 m is the endgame coast.
  #   seeker scan config (the gate-0 FINDINGS operating point): a FIXED grid of n_bins=64 cells ×
  #   bin_width=0.005 rad = a ±0.16 rad FOV about the α-β-predicted boresight; a Gaussian lobe σ_beam=
  #   0.015 rad per source; floor=1.0 (the homogeneous CFAR noise); n_pulses=10 (N_p=1 is too spiky →
  #   the gate fails; N_p≥3 works); CA-CFAR n_train=16/n_guard=4/pfa=1e-3 (the DETECTOR, reused
  #   UNCHANGED); gate_halfwidth=0.045 rad (the α-β validation-gate reject radius). α=0.30/β=0.05 are the
  #   slice-11 α-β gains (the DISCRIMINATOR's tracker). sigma_seek is INERT under :scan (see the header).
  - id: m1
    kind: missile
    pos: [0.0, 0.0, 3000.0]
    missile:
      mass_kg: 140.0
      speed: 700.0
      elevation_deg: 12.0
      cd_area_m2: 0.0
      rho: 1.225
      guidance: {k_guid: 3.0, n_pn: 4.0, r_stop: 30.0, kp: 2.0, ki: 0.0, kd: 0.0, tau: 0.3, a_max: 3000.0}
      seeker:
        sigma_seek: 3.0e-3      # INERT under :scan (noise moved into the profile floor) — kept for format
        alpha: 0.30
        beta: 0.05
        n_bins: 64
        bin_width: 0.005
        sigma_beam: 0.015
        floor: 1.0
        n_pulses: 10
        cfar_variant: ca
        cfar_n_train: 16
        cfar_n_guard: 4
        cfar_pfa: 1.0e-3
        gate_halfwidth: 0.045
  # The TRUE target: a constant-velocity aircraft ahead at 4.2 km altitude, descending-and-closing at
  # v[-800,0,200] — it crosses the interceptor's climb in x-z and OUTRUNS the missile. `intensity: 40`
  # is the target lobe amplitude over the floor (~16 dB — a clean CFAR detection). kind === :target →
  # `_nearest_target` returns THIS (the truth path / the miss readout).
  - id: tgt1
    kind: target
    pos: [6000.0, 0.0, 4200.0]
    vel: [-800.0, 0.0, 200.0]
    target: {rcs_m2: 1.0, intensity: 40.0}
  # The DECOY: born ALREADY-RESOLVED at ~0.10 rad above the target's bearing (offset in altitude so the
  # x-z bearing separates), flying PARALLEL (same velocity → a fixed linear offset). `intensity: 80` is
  # 2× the target's lobe amplitude (the brighter competing peak). kind === :decoy → `_nearest_target`
  # SKIPS it (the truth-path invariant); ONLY the `:scan` seeker's angular profile paints it → the
  # seeker CAN be seduced, but miss/CPA is ALWAYS vs tgt1. Constant velocity, constant intensity, present
  # from t=0 (the named approximations). Pos chosen (emit_probe.jl) so Δ₀ ≈ 0.10 rad (resolved) AND the
  # decoy stays inside ±FOV/2 across the midcourse aim window on the wire.
  - id: dcy1
    kind: decoy
    pos: [5850.0, 0.0, 4793.0]
    vel: [-800.0, 0.0, 200.0]
    decoy: {intensity: 80.0}

knobs:
  # The live sliders: the decoy intensity (the seduction-strength lever — drag it UP to make :none's
  # centroid pull harder; it only paints a taller lobe, no crash), the gate half-width (the discrimination
  # gate radius — the :gated lesson knob), the PN nav constant N, and the g-limit a_max. The seeker METHOD
  # (:scan) and the discrimination METHOD are the fidelity BUTTON, not knobs; launch/decoy geometry is not
  # a slider. `sigma_seek` is NOT exposed (INERT under :scan — the dead-knob surprise). intensity/
  # gate_halfwidth are validated ≥0 / >0 at LOAD; a_max/n_pn floored/clamped at the consumer (a live
  # slider can't crash a tick).
  - {target: dcy1, key: intensity,      min: 0.0,   max: 200.0,  label: "decoy intensity (lobe amp)"}
  - {target: m1,   key: gate_halfwidth, min: 0.01,  max: 0.16,   label: "gate half-width (rad)"}
  - {target: m1,   key: n_pn,           min: 2.0,   max: 6.0,    label: "N (nav constant)"}
  - {target: m1,   key: a_max,          min: 100.0, max: 5000.0, label: "a_max (g-limit, m/s²)"}
